{n:"Amazon–Talen Susquehanna PPA",cat:"Big Tech PPA",tech:"BWR (existing)",mw:960,dev:"Talen Energy",cust:"Amazon",date:"Active",st:"PA",lat:41.09,lon:-76.15},
{n:"Amazon–Constellation Limerick",cat:"Big Tech PPA",tech:"BWR (existing)",mw:0,dev:"Constellation",cust:"Amazon",date:"Active",st:"PA",lat:40.22,lon:-75.59},
{n:"Meta–Kairos (Natrium site)",cat:"Big Tech PPA",tech:"SFR",mw:0,dev:"TerraPower/Kairos",cust:"Meta",date:"~2030",st:"WY",lat:41.795,lon:-110.540},
{n:"Creekstone Delta Gigasite",cat:"SMR New Build",tech:"TBD",mw:2000,dev:"Creekstone/EnergySolutions",cust:"Data centers",date:"TBD",st:"UT",lat:39.352,lon:-112.577},
{n:"AP1000 Fleet (Westinghouse)",cat:"Large New Build",tech:"PWR AP1000",mw:6000,dev:"Westinghouse",cust:"TBD",date:"2030s",st:"SC",lat:34.296,lon:-81.320},
];

// ══════════════════════════════════════════════════════════════
// DATA: STATE REGULATORY
// ══════════════════════════════════════════════════════════════
const STATE_REG={AL:{m:"None",w:"None",e:"Clear"},AR:{m:"None",w:"None",e:"Clear"},AZ:{m:"None",w:"None",e:"Clear"},CA:{m:"HLW Repository Req.",w:"None",e:"Restricted"},CT:{m:"HLW Repository Req.",w:"None",e:"Restricted"},FL:{m:"None",w:"None",e:"Clear"},GA:{m:"None",w:"None",e:"Clear"},IL:{m:"Repealed",w:"None",e:"Clear"},KS:{m:"None",w:"None",e:"Clear"},LA:{m:"None",w:"HLW Import Ban",e:"Mixed"},MD:{m:"None",w:"None",e:"Clear"},MI:{m:"None",w:"None",e:"Clear"},MN:{m:"Certificate-of-Need Ban",w:"None",e:"Restricted"},MO:{m:"None",w:"None",e:"Clear"},MS:{m:"None",w:"None",e:"Clear"},NC:{m:"None",w:"None",e:"Clear"},NE:{m:"None",w:"None",e:"Clear"},NH:{m:"None",w:"None",e:"Clear"},NJ:{m:"Coastal Limits",w:"None",e:"Mixed"},NY:{m:"LIPA Area Ban",w:"None",e:"Mixed"},OH:{m:"None",w:"None",e:"Clear"},PA:{m:"None",w:"None",e:"Clear"},SC:{m:"None",w:"None",e:"Clear"},TN:{m:"None",w:"None",e:"Clear"},TX:{m:"None",w:"HLW Storage Ban",e:"Mixed"},VA:{m:"None",w:"None",e:"Clear"},WA:{m:"None",w:"Import Ban",e:"Mixed"},WI:{m:"Repealed",w:"None",e:"Clear"}};
const FIPS={1:"AL",2:"AK",4:"AZ",5:"AR",6:"CA",8:"CO",9:"CT",10:"DE",12:"FL",13:"GA",15:"HI",16:"ID",17:"IL",18:"IN",19:"IA",20:"KS",21:"KY",22:"LA",23:"ME",24:"MD",25:"MA",26:"MI",27:"MN",28:"MS",29:"MO",30:"MT",31:"NE",32:"NV",33:"NH",34:"NJ",35:"NM",36:"NY",37:"NC",38:"ND",39:"OH",40:"OK",41:"OR",42:"PA",44:"RI",45:"SC",46:"SD",47:"TN",48:"TX",49:"UT",50:"VT",51:"VA",53:"WA",54:"WV",55:"WI",56:"WY"};

// Category colors for pipeline
const CAT_CLR={Restart:"#D4622B","ARDP":"#1B6B6B","SMR New Build":"#5B3A7A","DOE Pilot":"#C4A035",Military:"#6B8B3D","Big Tech PPA":"#2B7ABF","Large New Build":"#8B2B2B"};
const CAT_SHAPE={Restart:"diamond","ARDP":"diamond","SMR New Build":"square","DOE Pilot":"triangle",Military:"cross","Big Tech PPA":"circle","Large New Build":"square"};

const ENV_CLR={Clear:"#3D5C3D",Mixed:"#C4A035",Restricted:"#8B2B2B"};

// ══════════════════════════════════════════════════════════════
// MAIN APP
// ══════════════════════════════════════════════════════════════
function App(){
  const [topo,setTopo]=useState(null);
  const [sel,setSel]=useState(null);
  const [hov,setHov]=useState(null);
  const [hovPos,setHovPos]=useState({x:0,y:0});
  const [layer,setLayer]=useState("uprate"); // uprate | pipeline | regulatory
  const [filt,setFilt]=useState({type:"All",mkt:"All",hr:"All",env:"All"});
  const [pipeCat,setPipeCat]=useState("All");
  const mapRef=useRef(null);

  const proj=useMemo(()=>d3.geoAlbersUsa().scale(1080).translate([476,296]),[]);
  const path=useMemo(()=>d3.geoPath().projection(proj),[proj]);

  useEffect(()=>{fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json").then(r=>r.json()).then(setTopo)},[]);

  const states=useMemo(()=>{
    if(!topo)return[];
    return topojson.feature(topo,topo.objects.states).features;
  },[topo]);

  // Filtered uprate data
  const filtUp=useMemo(()=>UPRATE_DATA.filter(r=>{
    if(filt.type!=="All"&&r.t!==filt.type)return false;
    if(filt.mkt!=="All"&&!r.mkt.startsWith(filt.mkt.slice(0,3)))return false;
    if(filt.hr==="Headroom"&&r.add===0)return false;
    if(filt.hr==="Maxed"&&r.add>0)return false;
    const sr=STATE_REG[r.s];
    if(filt.env!=="All"&&sr?.e!==filt.env)return false;
    return true;
  }),[filt]);

  // Aggregate to sites
  const upSites=useMemo(()=>{
    const m={};
    filtUp.forEach(r=>{
      const k=`${r.lat}_${r.lon}`;
      if(!m[k])m[k]={lat:r.lat,lon:r.lon,ps:[],add:0,st:r.s};
      m[k].ps.push(r);m[k].add+=r.add;
    });
    return Object.values(m);
  },[filtUp]);

  const filtPipe=useMemo(()=>pipeCat==="All"?PIPELINE_DATA:PIPELINE_DATA.filter(p=>p.cat===pipeCat),[pipeCat]);

  // Stats
  const stats=useMemo(()=>{
    const t=filtUp.reduce((a,r)=>a+r.add,0);
    return{u:filtUp.length,t,gwe:(t/3/1000).toFixed(1),hr:filtUp.filter(r=>r.add>0).length,
      s:new Set(filtUp.map(r=>r.s)).size,
      pipe:PIPELINE_DATA.reduce((a,p)=>a+p.mw,0)};
  },[filtUp]);

  const maxAdd=useMemo(()=>Math.max(...upSites.map(s=>s.add),1),[upSites]);

  const stFill=useCallback((id)=>{
    const abbr=FIPS[+id];const sr=STATE_REG[abbr];
    if(layer==="regulatory"&&sr)return sr.e==="Clear"?"#3D5C3D18":sr.e==="Mixed"?"#C4A03518":"#8B2B2B18";
    if(layer==="uprate"&&filtUp.some(r=>r.s===abbr))return"var(--news)";
    if(layer==="pipeline"&&PIPELINE_DATA.some(p=>p.st===abbr))return"#2B4B6F08";
    return"#EAE7DD";
  },[layer,filtUp]);

  // Shape renderers for pipeline markers
  const PipeMarker=({cx,cy,cat,r:rad,sel:isSel})=>{
    const c=CAT_CLR[cat]||"var(--g50)";
    const sh=CAT_SHAPE[cat]||"circle";
    const base={fill:c,stroke:"var(--paper)",strokeWidth:1.5,opacity:isSel?1:.9};
    const glow=isSel?{filter:"drop-shadow(0 0 6px "+c+")"}:{};
    if(sh==="diamond")return <rect x={cx-rad} y={cy-rad} width={rad*2} height={rad*2} transform={`rotate(45 ${cx} ${cy})`} {...base} style={glow}/>;
    if(sh==="square")return <rect x={cx-rad} y={cy-rad} width={rad*2} height={rad*2} {...base} style={glow}/>;
    if(sh==="triangle"){const pts=`${cx},${cy-rad*1.2} ${cx-rad},${cy+rad*.8} ${cx+rad},${cy+rad*.8}`;return <polygon points={pts} {...base} style={glow}/>;}
    if(sh==="cross")return <g style={glow}><rect x={cx-rad} y={cy-rad*.3} width={rad*2} height={rad*.6} {...base}/><rect x={cx-rad*.3} y={cy-rad} width={rad*.6} height={rad*2} {...base}/></g>;
    return <circle cx={cx} cy={cy} r={rad} {...base} style={glow}/>;
  };

  const Btn=({on,onClick,children})=><button className={`btn ${on?"btn-on":"btn-off"}`} onClick={onClick}>{children}</button>;

  return <div>
    {/* HEADER */}
    <header style={{background:"var(--ink)",color:"var(--paper)",padding:"20px 36px",textAlign:"center"}}>
      <h1 style={{fontSize:21,fontWeight:700,letterSpacing:".06em",textTransform:"uppercase",margin:"0 0 4px",fontFamily:"var(--serif)"}}>Nuclear Uprate &amp; Pipeline Map</h1>
      <p style={{fontSize:12,fontStyle:"italic",color:"var(--g30)",margin:0}}>Operating Fleet Uprate Potential + New Reactor Pipeline — U.S. Commercial &amp; DOE Projects</p>
    </header>

    <div style={{maxWidth:1400,margin:"0 auto",padding:"20px 36px"}}>

      {/* STATS BAR */}
      <div style={{display:"flex",gap:20,flexWrap:"wrap",marginBottom:14}}>
        {[{l:"Operating Units",v:stats.u},{l:"With Headroom",v:stats.hr},{l:"Uprate MWt",v:stats.t.toLocaleString()},{l:"≈ GWe",v:stats.gwe},{l:"Pipeline MW",v:stats.pipe.toLocaleString()}].map((s,i)=>
          <div key={i} style={{flex:"1 1 100px"}}>
            <div className="label" style={{marginBottom:2}}>{s.l}</div>
            <div className="stat-val">{s.v}</div>
          </div>
        )}
      </div>

      {/* LAYER + FILTER BAR */}
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:14}}>
        <span className="label" style={{marginRight:4}}>Layer</span>
        {["uprate","pipeline","regulatory"].map(l=><Btn key={l} on={layer===l} onClick={()=>{setLayer(l);setSel(null)}}>{l==="uprate"?"Uprate Potential":l==="pipeline"?"New Projects":"Regulatory"}</Btn>)}

        <span style={{width:1,height:20,background:"var(--g30)",margin:"0 6px"}}/>

        {layer==="uprate"&&<>
          <span className="label" style={{marginRight:4}}>Filter</span>
          {[{k:"type",o:["All","PWR","BWR"]},{k:"mkt",o:["All","Reg.","Merch."]},{k:"hr",o:["All","Headroom","Maxed"]},{k:"env",o:["All","Clear","Mixed","Restricted"]}].map(({k,o})=>
            <div key={k} style={{display:"flex",gap:2}}>{o.map(v=><Btn key={v} on={filt[k]===v} onClick={()=>setFilt(f=>({...f,[k]:v}))}>{v}</Btn>)}</div>
          )}
        </>}

        {layer==="pipeline"&&<>
          <span className="label" style={{marginRight:4}}>Category</span>
          {["All",...Object.keys(CAT_CLR)].map(c=><Btn key={c} on={pipeCat===c} onClick={()=>setPipeCat(c)}>
            {c==="All"?c:c}
          </Btn>)}
        </>}
      </div>

      {/* MAP + SIDEBAR */}
      <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>

        {/* MAP */}
        <div ref={mapRef} style={{flex:"1 1 680px",background:"var(--paper)",border:"1px solid var(--g30)",position:"relative",overflow:"hidden"}}>
          <svg viewBox="0 0 960 600" style={{width:"100%",display:"block"}}>
            <rect width="960" height="600" fill="var(--paper)"/>
            {/* States */}
            {states.map((f,i)=><path key={i} d={path(f)||""} fill={stFill(f.id)} stroke="var(--g30)" strokeWidth={.5}/>)}

            {/* UPRATE LAYER */}
            {(layer==="uprate"||layer==="regulatory")&&[...upSites].sort((a,b)=>b.add-a.add).map((s,i)=>{
              const pt=proj([s.lon,s.lat]);if(!pt)return null;
              const has=s.add>0;
              const rad=has?3+s.add/maxAdd*7:2.5;
              const sr=STATE_REG[s.st];
              const col=layer==="regulatory"?(ENV_CLR[sr?.e]||"var(--g50)"):(has?"var(--blue)":"var(--g50)");
              const isSel=sel?.type==="uprate"&&sel.lat===s.lat&&sel.lon===s.lon;
              return <g key={i} style={{cursor:"pointer"}}
                onClick={()=>setSel({type:"uprate",...s})}
                onMouseEnter={e=>{setHov({type:"uprate",...s});if(mapRef.current){const b=mapRef.current.getBoundingClientRect();setHovPos({x:e.clientX-b.left,y:e.clientY-b.top})}}}
                onMouseLeave={()=>setHov(null)}>
                {isSel&&<circle cx={pt[0]} cy={pt[1]} r={rad+5} fill="none" stroke={col} strokeWidth={2} strokeDasharray="4,2" style={{animation:"pulseGlow 2s infinite"}}/>}
                <circle cx={pt[0]} cy={pt[1]} r={rad} fill={col} stroke="var(--paper)" strokeWidth={has?1.2:.8} opacity={isSel?1:.85}/>
                {has&&rad>5&&<circle cx={pt[0]} cy={pt[1]} r={rad-1.5} fill="none" stroke="rgba(255,255,255,.3)" strokeWidth={.5}/>}
              </g>;
            })}

            {/* PIPELINE LAYER */}
            {layer==="pipeline"&&filtPipe.map((p,i)=>{
              const pt=proj([p.lon,p.lat]);if(!pt)return null;
              const rad=Math.max(4,Math.min(10,3+Math.sqrt(p.mw)/8));
              const isSel=sel?.type==="pipeline"&&sel.n===p.n;
              return <g key={i} style={{cursor:"pointer"}}
                onClick={()=>setSel({type:"pipeline",...p})}
                onMouseEnter={e=>{setHov({type:"pipeline",...p});if(mapRef.current){const b=mapRef.current.getBoundingClientRect();setHovPos({x:e.clientX-b.left,y:e.clientY-b.top})}}}
                onMouseLeave={()=>setHov(null)}>
                {isSel&&<circle cx={pt[0]} cy={pt[1]} r={rad+6} fill="none" stroke={CAT_CLR[p.cat]} strokeWidth={2} strokeDasharray="4,2"/>}
                <PipeMarker cx={pt[0]} cy={pt[1]} cat={p.cat} r={rad} sel={isSel}/>
              </g>;
            })}
          </svg>

          {/* Hover Tooltip */}
          {hov&&!sel&&<div className="tooltip" style={{position:"absolute",left:Math.min(hovPos.x+14,480),top:hovPos.y-10,background:"var(--paper)",border:"2px solid var(--ink)",padding:"10px 14px",pointerEvents:"none",zIndex:10,minWidth:200,maxWidth:280}}>
            {hov.type==="uprate"?<>
              <div style={{fontSize:14,fontWeight:700}}>{hov.ps.length>1?`${hov.ps[0].n.replace(/ \d$/,"")} (${hov.ps.length} units)`:hov.ps[0].n}</div>
              <div style={{fontSize:11,color:"var(--g70)",fontFamily:"var(--mono)",margin:"2px 0 4px"}}>{hov.st} · {hov.ps[0].t} · {hov.ps[0].lp}</div>
              <div style={{fontSize:13,fontWeight:700,color:hov.add>0?"var(--blue)":"var(--g50)"}}>{hov.add>0?`+${Math.round(hov.add).toLocaleString()} MWt headroom`:"Fully uprated"}</div>
            </>:<>
              <div style={{fontSize:14,fontWeight:700}}>{hov.n}</div>
              <div style={{fontSize:11,fontFamily:"var(--mono)",margin:"2px 0 4px"}}>
                <span style={{color:CAT_CLR[hov.cat],fontWeight:700}}>{hov.cat}</span>
                <span style={{color:"var(--g70)"}}> · {hov.tech} · {hov.st}</span>
              </div>
              {hov.mw>0&&<div style={{fontSize:13,fontWeight:700,color:CAT_CLR[hov.cat]}}>{hov.mw.toLocaleString()} MW</div>}
              <div style={{fontSize:11,color:"var(--g70)"}}>{hov.dev} → {hov.cust} · {hov.date}</div>
            </>}
          </div>}

          {/* Legend */}
          <div style={{position:"absolute",bottom:8,left:8,display:"flex",gap:12,fontSize:10,fontFamily:"var(--mono)",background:"rgba(253,252,249,.92)",padding:"6px 10px",border:"1px solid var(--g30)",flexWrap:"wrap"}}>
            {layer==="uprate"&&<>
              <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:8,height:8,borderRadius:"50%",background:"var(--blue)",display:"inline-block"}}/> Headroom</span>
              <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:8,height:8,borderRadius:"50%",background:"var(--g50)",display:"inline-block"}}/> Maxed</span>
              <span style={{color:"var(--warm)"}}>size = MWt potential</span>
            </>}
            {layer==="regulatory"&&Object.entries(ENV_CLR).map(([k,c])=>
              <span key={k} style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:8,height:8,background:c,border:"1px solid var(--g50)",display:"inline-block"}}/> {k}</span>
            )}
            {layer==="pipeline"&&Object.entries(CAT_CLR).map(([k,c])=>
              <span key={k} style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:7,height:7,background:c,display:"inline-block",transform:CAT_SHAPE[k]==="diamond"?"rotate(45deg)":"none",borderRadius:CAT_SHAPE[k]==="circle"?"50%":"0"}}/> {k}</span>
            )}
          </div>
        </div>

        {/* SIDEBAR */}
        <div style={{flex:"0 0 320px",maxHeight:580,overflowY:"auto",background:"var(--paper)",border:"1px solid var(--g30)"}}>

          {/* Detail panel */}
          {sel?<div style={{padding:16}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <h2 style={{fontSize:17,fontWeight:700,margin:0}}>{sel.type==="uprate"?(sel.ps[0].n.replace(/ \d$/,"")):sel.n}</h2>
                {sel.type==="uprate"&&<p style={{fontSize:11,color:"var(--g70)",fontFamily:"var(--mono)",margin:"3px 0 0"}}>{sel.st} · {sel.ps[0].t} · {sel.ps[0].lp} · {sel.ps[0].mkt}</p>}
                {sel.type==="pipeline"&&<p style={{fontSize:11,fontFamily:"var(--mono)",margin:"3px 0 0"}}><span style={{color:CAT_CLR[sel.cat],fontWeight:700}}>{sel.cat}</span> · {sel.tech} · {sel.st}</p>}
              </div>
              <button onClick={()=>setSel(null)} style={{background:"none",border:"1px solid var(--g30)",color:"var(--g70)",padding:"2px 8px",cursor:"pointer",fontFamily:"var(--mono)",fontSize:11}}>✕</button>
            </div>

            {sel.type==="uprate"&&(()=>{
              const all=UPRATE_DATA.filter(r=>r.lat===sel.lat&&r.lon===sel.lon);
              const totAdd=all.reduce((a,r)=>a+r.add,0);
              const totRef=all.reduce((a,r)=>a+r.ref,0);
              const sr=STATE_REG[sel.st];
              return <>
                {sr&&<div style={{display:"inline-block",padding:"3px 10px",fontSize:11,fontWeight:700,fontFamily:"var(--mono)",border:`2px solid ${ENV_CLR[sr.e]}`,color:ENV_CLR[sr.e],marginBottom:10}}>{sr.e.toUpperCase()} PATH</div>}
                {sr?.m!=="None"&&sr?.m!=="Repealed"&&<div style={{fontSize:12,color:"var(--red)",fontWeight:700,marginBottom:8,padding:"4px 10px",borderLeft:"3px solid var(--red)",background:"rgba(139,43,43,.05)"}}>Moratorium: {sr.m}</div>}
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:"var(--mono)",marginBottom:12}}>
                  <thead><tr>{["Unit","Ref MWt","Uprated","Add MWt"].map(h=><th key={h} style={{textAlign:h==="Unit"?"left":"right",padding:"3px 6px",borderBottom:"2px solid var(--ink)",fontSize:10}}>{h}</th>)}</tr></thead>
                  <tbody>{all.map((r,i)=><tr key={i}>
                    <td style={{padding:"3px 6px",borderBottom:"1px solid var(--g15)",fontWeight:700,fontFamily:"var(--serif)",fontSize:12}}>{r.n}</td>
                    <td style={{padding:"3px 6px",borderBottom:"1px solid var(--g15)",textAlign:"right"}}>{r.ref.toLocaleString()}</td>
                    <td style={{padding:"3px 6px",borderBottom:"1px solid var(--g15)",textAlign:"right"}}>{(r.up*100).toFixed(1)}%</td>
                    <td style={{padding:"3px 6px",borderBottom:"1px solid var(--g15)",textAlign:"right",fontWeight:700,color:r.add>0?"var(--blue)":"var(--g50)"}}>+{Math.round(r.add)}</td>
                  </tr>)}</tbody>
                </table>
                {totAdd>0&&<div style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:10,fontFamily:"var(--mono)",color:"var(--warm)",marginBottom:3}}>
                    <span>Current → Theoretical Cap</span>
                    <span style={{color:"var(--blue)",fontWeight:700}}>+{Math.round(totAdd).toLocaleString()} MWt</span>
                  </div>
                  <div style={{height:8,background:"var(--g15)",overflow:"hidden"}}>
                    <div style={{height:"100%",background:`linear-gradient(90deg,var(--g70) 0%,var(--g70) ${totRef/(totRef+totAdd)*100}%,var(--blue) ${totRef/(totRef+totAdd)*100}%,var(--blue) 100%)`}}/>
                  </div>
                </div>}
              </>;
            })()}

            {sel.type==="pipeline"&&<div style={{marginTop:8}}>
              {[{l:"Developer",v:sel.dev},{l:"Customer",v:sel.cust},{l:"Technology",v:sel.tech},{l:"Capacity",v:sel.mw>0?sel.mw.toLocaleString()+" MW":"Demo/R&D"},{l:"Target",v:sel.date},{l:"State",v:sel.st}].map((f,i)=>
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid var(--g15)",fontSize:12}}>
                  <span className="label">{f.l}</span>
                  <span style={{fontWeight:700,fontFamily:"var(--mono)"}}>{f.v}</span>
                </div>
              )}
            </div>}

          </div>

          /* LIST */
          :<div style={{padding:12}}>
            <h3 style={{fontSize:13,fontWeight:700,margin:"0 0 4px",textTransform:"uppercase",letterSpacing:".05em",fontVariant:"small-caps"}}>
              {layer==="pipeline"?"Pipeline Projects":"Top Uprate Opportunities"}
            </h3>
            <div style={{borderBottom:"1px solid var(--g30)",marginBottom:8}}/>

            {layer==="pipeline"?filtPipe.sort((a,b)=>b.mw-a.mw).map((p,i)=>
              <div key={i} className="side-item" onClick={()=>setSel({type:"pipeline",...p})}>
                <div style={{width:10,height:10,flexShrink:0,background:CAT_CLR[p.cat],borderRadius:CAT_SHAPE[p.cat]==="circle"?"50%":"0",transform:CAT_SHAPE[p.cat]==="diamond"?"rotate(45deg) scale(.8)":"none"}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:700}}>{p.n}</div>
                  <div style={{fontSize:10,color:"var(--g70)",fontFamily:"var(--mono)"}}>{p.cat} · {p.tech} · {p.date}</div>
                </div>
                {p.mw>0&&<div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,color:CAT_CLR[p.cat],flexShrink:0}}>{p.mw.toLocaleString()}</div>}
              </div>
            ):upSites.filter(s=>s.add>0).sort((a,b)=>b.add-a.add).slice(0,25).map((s,i)=>{
              const sr=STATE_REG[s.st];
              const nm=s.ps.length>1?`${s.ps[0].n.replace(/ \d$/,"")} (${s.ps.length}u)`:s.ps[0].n;
              return <div key={i} className="side-item" onClick={()=>setSel({type:"uprate",...s})}
                onMouseEnter={()=>setHov({type:"uprate",...s})} onMouseLeave={()=>setHov(null)}>
                <div style={{width:8,height:8,flexShrink:0,background:ENV_CLR[sr?.e]||"var(--g50)",border:"1px solid var(--g50)"}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:700}}>{nm}</div>
                  <div style={{fontSize:10,color:"var(--g70)",fontFamily:"var(--mono)"}}>{s.st} · {s.ps[0].t} · {s.ps[0].mkt}</div>
                </div>
                <div style={{fontFamily:"var(--mono)",fontSize:11,fontWeight:700,color:"var(--blue)",flexShrink:0}}>+{Math.round(s.add).toLocaleString()}</div>
              </div>;
            })}
          </div>}
        </div>
      </div>

      {/* FOOTER */}
      <footer style={{borderTop:"2px solid var(--ink)",paddingTop:12,marginTop:20,fontSize:10,color:"var(--g50)",textAlign:"center",fontStyle:"italic"}}>
        Sources: INL/RPT-24-78810 · NEI 2024 Update Survey · DOE Pathways to Commercial Liftoff: Advanced Nuclear (2024) · NRC Power Uprate Approvals · Kimley-Horn Nuclear Task Force Pipeline Tracker
      </footer>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
