<!DOCTYPE html>

<style>

</head>
<body>
<div id="root"></div>

<script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script crossorigin="anonymous" src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<script>
"use strict";
var h=React.createElement,uS=React.useState,uE=React.useEffect,uM=React.useMemo,uR=React.useRef;

/* ============================================================
   DATA SOURCES — all loaded at runtime from ./data/ so the map
   updates without editing this file.

     data/regulatory_data.json  -> state tiers (auto-refreshed weekly
                                    by scripts/update_regulatory.py;
                                    wording from manual_overrides.json)
     data/county_notes.json     -> FIPS-keyed local override layer
     data/state_iso.json        -> accurate state -> [markets] lookup
     data/iso_rto.topojson      -> real ISO/RTO balancing-authority
                                    geometry (crosses state lines)

   Tiers:  restricted = statewide moratorium / high statutory barrier
           partial    = geographic or site-specific restriction only
           clear      = no statewide restriction (default if absent)
   ============================================================ */

var TIER_COL={restricted:"#B0413A",clear:"#4E7A57"};
var TIER_LABEL={restricted:"Statewide moratorium / barrier",partial:"Partial — geographic or site-specific",clear:"No statewide restriction"};
var CFLAG_COL={restricted:"#B0413A",favorable:"#4E7A57",watch:"#C4A046"};

/* ISO/RTO operator codes (match data/iso_rto.topojson ids and state_iso.json) */
var ISO_COL={PJM:"#5B8DB8",MISO:"#C98A4B",SPP:"#8E7CC3",ERCOT:"#C95B5B",CAISO:"#5BA88A",NYISO:"#B86FA8",ISONE:"#6FA8B8"};
var ISO_ORDER=["PJM","MISO","SPP","ERCOT","CAISO","NYISO","ISONE"];

var ST_NAME={AL:"Alabama",AK:"Alaska",AZ:"Arizona",AR:"Arkansas",CA:"California",CO:"Colorado",CT:"Connecticut",DE:"Delaware",FL:"Florida",GA:"Georgia",HI:"Hawaii",ID:"Idaho",IL:"Illinois",IN:"Indiana",IA:"Iowa",KS:"Kansas",KY:"Kentucky",LA:"Louisiana",ME:"Maine",MD:"Maryland",MA:"Massachusetts",MI:"Michigan",MN:"Minnesota",MS:"Mississippi",MO:"Missouri",MT:"Montana",NE:"Nebraska",NV:"Nevada",NH:"New Hampshire",NJ:"New Jersey",NM:"New Mexico",NY:"New York",NC:"North Carolina",ND:"North Dakota",OH:"Ohio",OK:"Oklahoma",OR:"Oregon",PA:"Pennsylvania",RI:"Rhode Island",SC:"South Carolina",SD:"South Dakota",TN:"Tennessee",TX:"Texas",UT:"Utah",VT:"Vermont",VA:"Virginia",WA:"Washington",WV:"West Virginia",WI:"Wisconsin",WY:"Wyoming"};

  var _err=uS(null),loadErr=_err[0],setErr=_err[1];

  var sts=uM(function(){return topo?topojson.feature(topo,topo.objects.states).features:[]},[topo]);

  var isoRegions=uM(function(){

  var stats=uM(function(){

    var R=REG||{};
    Object.keys(R).forEach(function(k){var t=R[k];if(t.tier==="restricted")r++;else if(t.tier==="partial")p++;if(t.recent)rc++});

  function doHov(tp,data,ev){setHov(Object.assign({type:tp},data));if(mr.current){var b=mr.current.getBoundingClientRect();setHp({x:ev.clientX-b.left,y:ev.clientY-b.top})}}

    h("pattern",{id:"hp",width:7,height:7,patternUnits:"userSpaceOnUse",patternTransform:"rotate(45)"},

    h("pattern",{id:"hc",width:6,height:6,patternUnits:"userSpaceOnUse",patternTransform:"rotate(45)"},

      h("line",{x1:0,y1:0,x2:0,y2:6,stroke:"#5e1f1c",strokeWidth:2.5}))

  var svgK=[defs,h("rect",{key:"bg",width:960,height:600,fill:"#2D2D2D"})];

  /* States, filled by regulatory tier */
  sts.forEach(function(f,i){
    var ab=FP[String(f.id)];if(!ab)return;
    var rg=regOf(ab);
    var fill=rg.tier==="partial"?"url(#hp)":(TIER_COL[rg.tier]||TIER_COL.clear);

    svgK.push(h("path",{key:"s"+i,d:path(f)||"",fill:fill,stroke:stroke,strokeWidth:sw,opacity:showIso?.7:.95,style:{cursor:"pointer"},
      onClick:function(){if(!moved.current)pickState(ab)},
      onMouseEnter:function(ev){doHov("st",{ab:ab},ev)},
      onMouseLeave:function(){setHov(null)}}));
  });

  /* County detail overlay */
  if(showCo){
    counties.forEach(function(f,i){

        style:{cursor:cn?"pointer":"default",pointerEvents:cn?"auto":"none"},
        onClick:function(){if(cn&&!moved.current)pickCounty(fid,f)},
        onMouseEnter:cn?function(ev){doHov("co",{fid:fid},ev)}:null,
        onMouseLeave:cn?function(){setHov(null)}:null}));

  }

  /* REAL ISO/RTO regions: translucent fill + halo + colored outline + centroid label */
  if(showIso){
    isoRegions.forEach(function(rr,i){
      var col=ISO_COL[rr.iso]||"#888";
      svgK.push(h("path",{key:"isof"+i,d:path(rr.feature)||"",fill:col,opacity:.12,style:{pointerEvents:"none"}}));
    });
    isoRegions.forEach(function(rr,i){
      var col=ISO_COL[rr.iso]||"#888";
      svgK.push(h("path",{key:"isoc"+i,d:path(rr.feature)||"",fill:"none",stroke:"#1A1A1A",strokeWidth:4.2,opacity:.55,style:{pointerEvents:"none"}}));
      svgK.push(h("path",{key:"iso"+i,d:path(rr.feature)||"",fill:"none",stroke:col,strokeWidth:2.2,style:{pointerEvents:"none"}}));
    });
    isoRegions.forEach(function(rr,i){
      var c=path.centroid(rr.feature);if(!c||isNaN(c[0]))return;

      tk.push(h("div",{key:"b",style:{fontSize:11,fontFamily:"var(--m)",margin:"3px 0",color:tc,fontWeight:700}},(TIER_LABEL[rg.tier]||TIER_LABEL.clear).toUpperCase()));

    }

  }

  /* Legend */

    h("div",{style:{marginTop:5,color:"#777",fontSize:9,lineHeight:1.3}},"Balancing-authority footprints. Territories interconnect at the seams.")

  /* Side panel */
  var side;
  if(sel&&sel.type==="st"){

      h("div",{style:{borderBottom:"1px solid #555",marginBottom:8}}),

        return h("div",{key:k,className:"si",onClick:function(){pickState(k)}},
          h("span",{style:{width:10,height:10,flexShrink:0,background:rg.tier==="partial"?"none":tc,backgroundImage:rg.tier==="partial"?"repeating-linear-gradient(45deg,#C4A046 0 3px,#6b5a22 3px 5px)":"none"}}),
